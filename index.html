<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amal Suresh | Digital Artist</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #05070a; 
            --surface: #0d1117; 
            --accent-primary: #00d4ff;
            --accent-glow: rgba(0, 212, 255, 0.2);
            --text-main: #ffffff;       
            --text-dim: #94a3b8; 
            --border: rgba(255, 255, 255, 0.08); 
        }

        /* cursor: none is essential for the custom brush to work */
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: none; }
        
        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- CUSTOM PAINT BRUSH CURSOR --- */
        #cursor-brush {
            position: fixed; top: 0; left: 0; font-size: 24px; color: var(--accent-primary);
            pointer-events: none; z-index: 10001; transform: translate(-10%, -10%) rotate(-15deg);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        #cursor-glow {
            position: fixed; top: 0; left: 0; width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.07) 0%, transparent 70%);
            border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 1;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 2; }

        /* --- Navigation --- */
        header.nav-header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 25px 0; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: rgba(5, 7, 10, 0.8); backdrop-filter: blur(10px); z-index: 1000;
        }
        .logo { font-size: 14px; font-weight: 800; letter-spacing: 4px; text-decoration: none; color: var(--text-main); text-transform: uppercase; }
        .logo span { color: var(--accent-primary); } 
        
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: var(--text-dim); text-decoration: none; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .nav-links a:hover { color: var(--accent-primary); }
        
        .resume-btn {
            background: rgba(0, 212, 255, 0.1); border: 1px solid var(--accent-primary);
            color: var(--accent-primary) !important; padding: 8px 15px; border-radius: 4px; margin-left: 10px;
        }
        .resume-btn:hover { background: var(--accent-primary); color: #000 !important; }

        /* --- Hero Section --- */
        .hero { text-align: center; padding: 8rem 0 4rem; }
        .hero h1 { font-family: 'Limelight', cursive; font-size: clamp(3.5rem, 10vw, 6rem); line-height: 1.1; margin-bottom: 20px; letter-spacing: 2px; }
        .hero h1 span { color: var(--accent-primary); text-shadow: 0 0 30px var(--accent-glow); }
        .hero p.desc { color: var(--text-dim); max-width: 600px; margin: 0 auto; font-size: 18px; }

        /* --- Technical Arsenal --- */
        .arsenal-section { padding: 6rem 0; text-align: center; }
        .tool-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; margin-top: 40px; }
        .tool-card { background: var(--surface); border: 1px solid var(--border); padding: 25px; text-align: center; border-radius: 12px; width: 170px; }
        .tool-card img { width: 50px; height: 50px; margin-bottom: 15px; object-fit: contain; }
        .tool-card span { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-dim); }
        .tool-card:hover { border-color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-glow); }

        /* --- Gallery Section --- */
        .filter-controls { display: flex; justify-content: center; gap: 15px; margin: 2rem 0 4rem; flex-wrap: wrap; }
        .filter-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-dim);
            padding: 10px 25px; cursor: pointer; border-radius: 30px; font-size: 12px;
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .filter-btn.active, .filter-btn:hover { border-color: var(--accent-primary); color: var(--accent-primary); }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; }
        .art-card { background-color: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; position: relative; }
        .art-card img { width: 100%; height: 450px; object-fit: cover; opacity: 0.7; filter: saturate(0.5); }
        .art-card:hover { transform: translateY(-10px); border-color: var(--accent-primary); box-shadow: 0 0 40px var(--accent-glow); }
        .art-card:hover img { opacity: 1; filter: saturate(1); transform: scale(1.05); }

        .card-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px;
            background: linear-gradient(transparent, rgba(5, 7, 10, 0.95));
            opacity: 0; transition: 0.4s;
        }
        .art-card:hover .card-overlay { opacity: 1; }
        .card-overlay h3 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 22px; }

        footer { text-align: center; padding: 6rem 0; border-top: 1px solid var(--border); margin-top: 6rem; }
        .contact-link { font-family: 'Playfair Display', serif; font-size: clamp(1.5rem, 4vw, 2.5rem); color: #fff; text-decoration: none; font-style: italic; border-bottom: 2px solid var(--accent-primary); }

        @media (max-width: 768px) { * { cursor: auto; } #cursor-glow, #cursor-brush { display: none; } }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <i class="fa-solid fa-paint-brush" id="cursor-brush"></i>

    <div class="container">
        <header class="nav-header">
            <a href="#" class="logo">Amal <span>Suresh</span></a>
            <nav class="nav-links">
                <a href="https://www.linkedin.com/in/amal-suresh-1996aa369?utm_source=share&utm_campaign=share_via&utm_content=profile&utm_medium=android_app" target="_blank"><i class="fa-brands fa-linkedin"></i> LinkedIn</a>
                <a href="https://www.artstation.com/amalcs" target="_blank"><i class="fa-brands fa-artstation"></i> ArtStation</a>
                <a href="mailto:amalsuresh734@gmail.com">Contact</a>
                <a href="resume.pdf" download class="resume-btn"><i class="fa-solid fa-download"></i> Resume</a>
            </nav>
        </header>

        <main>
            <section class="hero">
                <h1>Amal <span>Suresh</span></h1>
                <p class="desc">2D Gaming Concept Artist & Digital Artist.</p>
            </section>

            <section class="arsenal-section">
                <div class="tool-grid">
                    <div class="tool-card"><img src="pngwing.com(1).png" alt="PS"><span>Photoshop</span></div>
                    <div class="tool-card"><img src="pngwing.com.png" alt="AI"><span>Illustrator</span></div>
                    <div class="tool-card"><i class="fa-solid fa-palette" style="font-size: 40px; color: var(--accent-primary); margin-bottom: 15px; display: block;"></i><span>Digital Painting</span></div>
                </div>
            </section>

            <section id="work">
                <div class="filter-controls">
                    <button class="filter-btn active" onclick="filterSelection('all')">All Work</button>
                    <button class="filter-btn" onclick="filterSelection('bg')">Backgrounds</button>
                    <button class="filter-btn" onclick="filterSelection('character')">Characters</button>
                    <button class="filter-btn" onclick="filterSelection('icons')">Icons</button>
                    <button class="filter-btn" onclick="filterSelection('sketches')">Sketches</button>
                </div>

                <div class="gallery-grid">
                    <div class="art-card bg"><img src="art1.jpg" alt="BG"></div>
                    
                    <div class="art-card character"><img src="art2.jpg" alt="Char"></div>

                    <div class="art-card icons">
                        <img src="icon1.png" alt="Main Icon Set">
                        <div class="card-overlay"><h3>Core Icons</h3></div>
                    </div>
                    <div class="art-card icons">
                        <img src="page1.png" alt="Icon Page 1">
                        <div class="card-overlay"><h3>Icon Design - Page 1</h3></div>
                    </div>
                    <div class="art-card icons">
                        <img src="page2.png" alt="Icon Page 2">
                        <div class="card-overlay"><h3>Icon Design - Page 2</h3></div>
                    </div>

                    <div class="art-card sketches"><img src="art3.jpg" alt="Sketch"></div>
                </div>
            </section>
        </main>

        <footer>
            <a href="mailto:amalsuresh734@gmail.com" class="contact-link">amalsuresh734@gmail.com</a>
        </footer>
    </div>

    <script>
        const glow = document.getElementById('cursor-glow');
        const brush = document.getElementById('cursor-brush');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px';
            brush.style.left = e.clientX + 'px'; brush.style.top = e.clientY + 'px';
        });

        function filterSelection(c) {
            const x = document.getElementsByClassName("art-card");
            if (c == "all") c = "";
            for (let i = 0; i < x.length; i++) {
                x[i].style.display = "none";
                if (x[i].className.indexOf(c) > -1) x[i].style.display = "block";
            }
            const btns = document.getElementsByClassName("filter-btn");
            for (let i = 0; i < btns.length; i++) { btns[i].classList.remove("active"); }
            event.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
